<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Task Timer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>Tasks</h1>
    <span id="total-time" title="Total time across all tasks">00:00:00</span>
  </header>

  <form id="add-form">
    <input
      id="new-task"
      type="text"
      placeholder="Add a task…"
      autocomplete="off"
      maxlength="80"
    />
    <button type="submit" title="Add task">+</button>
  </form>

  <ul id="task-list"></ul>

  <p id="empty-state" hidden>No tasks yet. Add one above.</p>

  <div id="footer-actions">
    <button id="minus-45" type="button" hidden title="Subtract 45 minutes from the running task">−45 min</button>
    <button id="clear-all" type="button" hidden>Clear all</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
